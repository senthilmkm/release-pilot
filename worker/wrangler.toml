name = "release-pilot"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# How the cron fires. */15 = every 15 minutes (Apple's typical state-change cadence).
# Keep this aggressive enough that "Apple just approved your app" feels
# instant, but loose enough that we stay well under D1 + APNs rate limits.
[triggers]
crons = ["*/15 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "release-pilot"
# Filled in by `wrangler d1 create release-pilot` — DO NOT COMMIT a real id.
database_id = "REPLACE_AFTER_DB_CREATE"

# Secrets are SET via `wrangler secret put NAME` (never committed):
#   APNS_TEAM_ID         — Apple Developer team id (e.g. 2KJK6895B3)
#   APNS_KEY_ID          — APNs auth key id (10 chars)
#   APNS_KEY_P8          — the .p8 PEM contents (multi-line; pipe through stdin)
#   APNS_BUNDLE_ID       — app.releasepilot.ios
#   CREDS_MASTER_KEY_B64 — 32 random bytes, base64; used to AES-GCM-encrypt stored creds
#
# Public vars below are non-secret config you DO commit.

[vars]
APNS_HOST = "https://api.push.apple.com"
# Polling concurrency per cron run — keep small to stay under the
# 50 ms CPU limit per request on Workers free tier. We can bump this
# once we're on the paid tier ($5/mo).
POLL_CONCURRENCY = "5"
# Max device rows touched per cron tick — protects against runaway costs
# if registrations spike. Excess rows roll over to the next tick.
POLL_BATCH_SIZE = "100"
